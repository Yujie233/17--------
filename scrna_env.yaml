name: scrna
channel_priority: strict
channels:
  - conda-forge
  - bioconda
  
  #- defaults
dependencies:
  # Python 基础
  - python=3.9
  - pandas
  - numpy
  - matplotlib
  - seaborn
  - openpyxl          # 可选，保留
  - ipykernel
  - bioconductor-deseq2  
  - adjusttext          # conda 中包名为 adjusttext (注意全小写)
  - mygene              # mygene 包
  - matplotlib-venn
  # Python 单细胞生态
  - scanpy
  - anndata
  - leidenalg
  - python-igraph
  - umap-learn
  - networkx

  # R 及单细胞核心包
  - r-base        # 或 4.3，与 Seurat5 兼容
  - r-seurat    # 或 5.0.0（需 R>=4.1）
  - r-dplyr
  - r-ggplot2
  - r-patchwork
  - bioconductor-limma
  - bioconductor-clusterprofiler   # 修正：原 clusterProfiler
  - bioconductor-org.hs.eg.db     # 修正：原 org.Hs.eg.db
  - r-biocmanager    
  - r-stringi
  - r-igraph>=1.5.0

  # Python-R 桥接
  - rpy2